name: Collector Manual Update

on:
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATA_DIR: ${{ github.workspace }}/data
    outputs:
      changed: ${{ steps.data_changes.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "This workflow only pushes directly to main."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@8f152de45cc31bc9d716420f1ac7c0c7993907ec
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Run collector
        working-directory: worker
        run: npm run run:collector -- --data-dir "$DATA_DIR"

      - name: Verify only data files changed
        shell: bash
        run: |
          set -euo pipefail

          unexpected="$(git status --porcelain | awk '{print $2}' | grep -vE '^(data/current-pricing\.json|data/pricing-history\.json)$' || true)"

          if [ -n "$unexpected" ]; then
            echo "Unexpected changed files detected:"
            echo "$unexpected"
            exit 1
          fi

      - name: Detect data changes
        id: data_changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet --exit-code -- data/current-pricing.json data/pricing-history.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload updated data artifact
        if: steps.data_changes.outputs.changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: updated-pricing-data
          path: |
            data/current-pricing.json
            data/pricing-history.json
          if-no-files-found: error

  commit-and-push:
    runs-on: ubuntu-latest
    needs: collect-data
    if: needs.collect-data.outputs.changed == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download updated data artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: updated-pricing-data
          path: data

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit updated pricing data
        run: |
          git add data/current-pricing.json data/pricing-history.json
          git commit -m "chore(data): update pricing snapshot"

      - name: Push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main
